<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Kudret! 🎂</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        /* Global resets */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #090514;
        }

        /* Background toggle */
        .music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .music-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .music-toggle.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.8s ease, visibility 0.8s;
            background: radial-gradient(circle at center, rgba(15, 12, 32, 0.4) 0%, rgba(10, 8, 20, 0.85) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Welcome Card */
        .card.glass {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            animation: cardFloat 4s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: iconSpin 6s linear infinite;
            display: inline-block;
        }

        @keyframes iconSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .welcome-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .welcome-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 117, 140, 0.5);
        }

        /* Celebration overlay (no interaction blocking behind it) */
        #celebration-screen {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            pointer-events: none;
        }

        .celebration-content {
            text-align: center;
            max-width: 800px;
            width: 95%;
            padding: 2rem;
            pointer-events: auto;
        }

        .birthday-title {
            font-family: 'Pacifico', cursive;
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #ff4e50, #f9d423, #e100ff, #00b8ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowText 8s ease infinite, textGlow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 10px rgba(255, 78, 80, 0.3)); }
            to { filter: drop-shadow(0 0 25px rgba(0, 184, 255, 0.6)); }
        }

        .birthday-subtitle {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s forwards 0.5s ease-out;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .gift-box-wrapper {
            font-size: 5rem;
            display: inline-block;
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.12); }
            28% { transform: scale(1); }
            42% { transform: scale(1.12); }
            70% { transform: scale(1); }
        }

        /* 2D Stage */
        #game-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #090514 0%, #150a28 45%, #2a0b32 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            z-index: 1;
        }

        /* Background Sun Glow */
        .sun-glow {
            position: absolute;
            bottom: 200px;
            right: 25%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.22) 0%, rgba(139, 92, 246, 0.05) 60%, transparent 100%);
            border-radius: 50%;
            transform: translate(30%, 30%);
            filter: blur(30px);
            z-index: 2;
            pointer-events: none;
        }

        /* Road/Floor Platform */
        .floor-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 130px;
            background: linear-gradient(to bottom, #110d29 0%, #0c0820 100%);
            border-top: 5px solid #8b5cf6;
            box-shadow: 0 -10px 30px rgba(139, 92, 246, 0.25);
            z-index: 3;
        }

        /* Giant "22" Milestone */
        .milestone {
            position: absolute;
            bottom: 125px;
            right: 25%;
            display: flex;
            gap: 15px;
            z-index: 4;
        }

        .digit {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 8.5rem;
            color: #f59e0b;
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5))
                    drop-shadow(0 0 25px rgba(236, 72, 153, 0.3));
            animation: digitPulse 2s ease-in-out infinite alternate;
        }

        .digit:nth-child(2) {
            animation-delay: 0.3s;
        }

        @keyframes digitPulse {
            from {
                transform: translateY(0) scale(1);
            }
            to {
                transform: translateY(-8px) scale(1.03);
            }
        }

        /* 2D Character Styling & Limb Rotation Origins */
        .character-container {
            position: absolute;
            bottom: 125px; /* Sits exactly on top of floor-line */
            left: -180px; /* Starts off-screen */
            width: 160px;
            height: 250px;
            z-index: 10;
            transition: transform 0.1s linear;
        }

        /* Set transform origins relative to SVG ViewBox (0 0 160 250) */
        #left-leg {
            transform-origin: 64px 180px;
            transform-box: view-box;
        }

        #right-leg {
            transform-origin: 94px 180px;
            transform-box: view-box;
        }

        #left-arm {
            transform-origin: 52px 115px;
            transform-box: view-box;
        }

        #right-arm {
            transform-origin: 106px 115px;
            transform-box: view-box;
        }

        /* Flying Glasses (HTML overlay for the throw) */
        .flying-glasses {
            position: absolute;
            width: 40px;
            height: 25px;
            z-index: 12;
            pointer-events: none;
            transform-origin: center;
        }

        .flying-glasses.hidden {
            display: none;
        }

        /* Dynamic 2D Balloons */
        #balloons-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .balloon-2d {
            position: absolute;
            width: 55px;
            height: 72px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: inset -6px -6px 0 rgba(0,0,0,0.18);
            pointer-events: none;
        }

        /* Balloon Knot */
        .balloon-2d::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: calc(50% - 4px);
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 7px solid currentColor;
        }

        /* Balloon String */
        .balloon-string-2d {
            position: absolute;
            bottom: -60px;
            left: 50%;
            width: 1.5px;
            height: 60px;
            background: rgba(255, 255, 255, 0.35);
        }

        /* Responsive adjustments */
        #character-svg, .flying-glasses svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 600px) {
            .floor-line {
                height: 90px;
            }
            .character-container {
                width: 110px;
                height: 172px;
                bottom: 85px;
            }
            .milestone {
                right: 12%;
                bottom: 85px;
                gap: 10px;
            }
            .digit {
                font-size: 5rem;
            }
            .flying-glasses {
                width: 28px;
                height: 17px;
            }
            .sun-glow {
                right: 12%;
                width: 220px;
                height: 220px;
                bottom: 120px;
            }
            .birthday-title {
                font-size: 2.4rem;
                margin-bottom: 1rem;
            }
            .birthday-subtitle {
                font-size: 1rem;
                margin-bottom: 1.5rem;
                padding: 0 10px;
            }
            .gift-box-wrapper {
                font-size: 3.5rem;
            }
            .card.glass {
                padding: 2rem 1.5rem;
            }
            .welcome-title {
                font-size: 1.7rem;
            }
            .welcome-text {
                font-size: 0.95rem;
                margin-bottom: 1.8rem;
            }
            .btn {
                padding: 0.8rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>

    <!-- Include Canvas Confetti CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // --- Application State Management ---
        const STATE_IDLE = 'idle';
        const STATE_WALKING = 'walking';
        const STATE_THROWING = 'throwing';
        const STATE_CELEBRATING = 'celebrating';

        let currentState = STATE_IDLE;
        let animationFrameId = null;
        let startTime = null;

        // Element References
        let characterContainer, leftLeg, rightLeg, leftArm, rightArm;
        let characterGlasses, flyingGlasses, milestone22;
        let balloonsContainer;

        // Physics / Positions
        let charX = -180;
        let destX = 0;
        const walkSpeed = 2.4;

        // Throw glasses physics
        let throwStartLeft = 0;
        let throwStartTop = 0;
        let throwEndLeft = 0;
        let throwEndTop = 0;
        let throwProgress = 0;

        // --- Audio Synthesizer (Web Audio API) ---
        let audioCtx = null;
        let masterGain = null;
        let audioPlaying = false;
        let songTimeoutId = null;

        const melodyNotes = [
            { f: 392.00, d: 0.75 }, { f: 392.00, d: 0.25 }, { f: 440.00, d: 1 }, { f: 392.00, d: 1 }, { f: 523.25, d: 1 }, { f: 493.88, d: 2 },
            { f: 392.00, d: 0.75 }, { f: 392.00, d: 0.25 }, { f: 440.00, d: 1 }, { f: 392.00, d: 1 }, { f: 587.33, d: 1 }, { f: 523.25, d: 2 },
            { f: 392.00, d: 0.75 }, { f: 392.00, d: 0.25 }, { f: 783.99, d: 1 }, { f: 659.25, d: 1 }, { f: 523.25, d: 1 }, { f: 493.88, d: 1 }, { f: 440.00, d: 2 },
            { f: 698.46, d: 0.75 }, { f: 698.46, d: 0.25 }, { f: 659.25, d: 1 }, { f: 523.25, d: 1 }, { f: 587.33, d: 1 }, { f: 523.25, d: 2 }
        ];
        const tempo = 140; 
        const beatDuration = 60 / tempo;

        function initAudio() {
            if (audioCtx) return;
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContextClass();
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            masterGain.connect(audioCtx.destination);
        }

        function playMelody(scheduledTime) {
            if (!audioPlaying) return;
            let currentScheduledTime = scheduledTime;
            
            melodyNotes.forEach(note => {
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(note.f, currentScheduledTime);
                
                noteGain.gain.setValueAtTime(0, currentScheduledTime);
                noteGain.gain.linearRampToValueAtTime(0.18, currentScheduledTime + 0.02);
                noteGain.gain.setValueAtTime(0.18, currentScheduledTime + note.d * beatDuration - 0.04);
                noteGain.gain.linearRampToValueAtTime(0, currentScheduledTime + note.d * beatDuration);
                
                osc.connect(noteGain);
                noteGain.connect(masterGain);
                osc.start(currentScheduledTime);
                osc.stop(currentScheduledTime + note.d * beatDuration);
                currentScheduledTime += note.d * beatDuration;
            });
            
            const loopDuration = melodyNotes.reduce((sum, n) => sum + n.d * beatDuration, 0);
            songTimeoutId = setTimeout(() => {
                playMelody(currentScheduledTime);
            }, loopDuration * 1000 - 50);
        }

        function startMusic() {
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            audioPlaying = true;
            document.getElementById('music-toggle').classList.remove('hidden');
            playMelody(audioCtx.currentTime + 0.1);
        }

        function stopMusic() {
            audioPlaying = false;
            if (songTimeoutId) {
                clearTimeout(songTimeoutId);
                songTimeoutId = null;
            }
        }

        // --- 2D Balloon Spawning System ---
        const balloonColors = ['#ff007f', '#00f0ff', '#ffea00', '#39ff14', '#ff5e00', '#e100ff', '#ff8b94'];
        const activeBalloons = [];
        let balloonIntervalId = null;

        function spawnBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon-2d';
            const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            balloon.style.color = color;
            balloon.style.backgroundColor = color;
            
            const string = document.createElement('div');
            string.className = 'balloon-string-2d';
            balloon.appendChild(string);
            
            const startX = Math.random() * window.innerWidth;
            const speed = Math.random() * 1.5 + 2.0; 
            const swingAmp = Math.random() * 30 + 15;
            const swingFreq = Math.random() * 0.03 + 0.015;
            
            balloon.style.left = startX + 'px';
            balloon.style.top = window.innerHeight + 100 + 'px';
            
            balloonsContainer.appendChild(balloon);
            activeBalloons.push({
                element: balloon,
                x: startX,
                y: window.innerHeight + 100,
                speed: speed,
                swingAmp: swingAmp,
                swingFreq: swingFreq,
                phase: Math.random() * Math.PI * 2
            });
        }

        function updateBalloons(time) {
            for (let i = activeBalloons.length - 1; i >= 0; i--) {
                const b = activeBalloons[i];
                b.y -= b.speed;
                const currentX = b.x + Math.sin(time * b.swingFreq * 4 + b.phase) * b.swingAmp;
                b.element.style.left = currentX + 'px';
                b.element.style.top = b.y + 'px';
                if (b.y < -120) {
                    b.element.remove();
                    activeBalloons.splice(i, 1);
                }
            }
        }

        // --- Main Animation loop ---
        function updateAnimation() {
            animationFrameId = requestAnimationFrame(updateAnimation);
            const time = (Date.now() - startTime) / 1000;
            
            if (currentState === STATE_WALKING) {
                if (charX < destX) {
                    charX += walkSpeed;
                    characterContainer.style.left = charX + 'px';
                    const legAngle = Math.sin(time * 10.5) * 28;
                    leftLeg.style.transform = `rotate(${legAngle}deg)`;
                    rightLeg.style.transform = `rotate(${-legAngle}deg)`;
                    leftArm.style.transform = `rotate(${-legAngle * 0.6}deg)`;
                    rightArm.style.transform = `rotate(${legAngle * 0.6}deg)`;
                    characterContainer.style.transform = `translateY(${Math.abs(Math.sin(time * 21)) * 3}px)`;
                } else {
                    leftLeg.style.transform = '';
                    rightLeg.style.transform = '';
                    leftArm.style.transform = '';
                    rightArm.style.transform = '';
                    characterContainer.style.transform = '';
                    currentState = STATE_THROWING;
                    throwProgress = 0;
                    const isMobile = window.innerWidth <= 600;
                    const floorHeight = isMobile ? 90 : 130;
                    const charHeight = isMobile ? 172 : 250;
                    const scaleRatio = isMobile ? (110 / 160) : 1;
                    const eyeOffsetX = 78 * scaleRatio;
                    const eyeOffsetY = 74 * scaleRatio;
                    
                    throwStartLeft = charX + eyeOffsetX;
                    throwStartTop = window.innerHeight - floorHeight - charHeight + eyeOffsetY;
                    throwEndLeft = throwStartLeft + (isMobile ? 90 : 140);
                    throwEndTop = window.innerHeight - floorHeight - (isMobile ? 10 : 15);
                }
            }
            
            if (currentState === STATE_THROWING) {
                throwProgress += 0.024;
                if (throwProgress < 0.25) {
                    rightArm.style.transform = 'rotate(-85deg)';
                } else if (throwProgress < 0.5) {
                    rightArm.style.transform = 'rotate(45deg)';
                    characterGlasses.style.display = 'none';
                    flyingGlasses.classList.remove('hidden');
                } else {
                    rightArm.style.transform = 'rotate(0deg)';
                }
                
                if (throwProgress >= 0.35 && throwProgress <= 1.0) {
                    const t = (throwProgress - 0.35) / 0.65; 
                    const currentLeft = throwStartLeft + (throwEndLeft - throwStartLeft) * t;
                    const currentTop = throwStartTop * (1 - t) + throwEndTop * t - Math.sin(t * Math.PI) * 110;
                    const spin = t * 720;
                    flyingGlasses.style.left = currentLeft + 'px';
                    flyingGlasses.style.top = currentTop + 'px';
                    flyingGlasses.style.transform = `rotate(${spin}deg)`;
                } else if (throwProgress > 1.0) {
                    flyingGlasses.style.left = throwEndLeft + 'px';
                    flyingGlasses.style.top = throwEndTop + 'px';
                    flyingGlasses.style.transform = 'rotate(15deg)';
                    triggerCelebration();
                }
            }
            
            if (currentState === STATE_CELEBRATING) {
                const jumpY = Math.max(0, Math.sin(time * 14) * 22);
                characterContainer.style.transform = `translateY(${-jumpY}px)`;
                const waveAngle = Math.sin(time * 16) * 18;
                leftArm.style.transform = `rotate(${145 + waveAngle}deg)`;
                rightArm.style.transform = `rotate(${-145 - waveAngle}deg)`;
                updateBalloons(time);
            }
        }

        function triggerCelebration() {
            currentState = STATE_CELEBRATING;
            document.getElementById('celebration-screen').classList.remove('hidden');
            if (!balloonIntervalId) {
                balloonIntervalId = setInterval(spawnBalloon, 750);
                for(let i = 0; i < 6; i++) {
                    setTimeout(spawnBalloon, i * 200);
                }
            }
            confetti({ particleCount: 100, spread: 70, origin: { x: 0.1, y: 0.7 } });
            confetti({ particleCount: 100, spread: 70, origin: { x: 0.9, y: 0.7 } });
            
            const end = Date.now() + (12 * 1000);
            (function frame() {
                if (currentState !== STATE_CELEBRATING) return;
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function startSequence() {
            currentState = STATE_WALKING;
            startTime = Date.now();
            document.getElementById('welcome-screen').classList.add('hidden');
            const isMobile = window.innerWidth <= 600;
            const milestoneRect = milestone22.getBoundingClientRect();
            destX = milestoneRect.left - (isMobile ? 85 : 130);
            if (destX < (isMobile ? 20 : 50)) { destX = window.innerWidth * (isMobile ? 0.35 : 0.45); }
            startMusic();
            if (!animationFrameId) { updateAnimation(); }
        }

        window.onload = () => {
            characterContainer = document.getElementById('character-container');
            leftLeg = document.getElementById('left-leg');
            rightLeg = document.getElementById('right-leg');
            leftArm = document.getElementById('left-arm');
            rightArm = document.getElementById('right-arm');
            characterGlasses = document.getElementById('character-glasses');
            flyingGlasses = document.getElementById('flying-glasses');
            milestone22 = document.getElementById('milestone-22');
            balloonsContainer = document.getElementById('balloons-container');
            
            characterContainer.style.left = charX + 'px';
            
            // Safari / Chrome Web Audio API unlock helper
            const unlockAudio = () => {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            };
            window.addEventListener('click', unlockAudio, { once: true });
            window.addEventListener('touchstart', unlockAudio, { once: true });
            
            document.getElementById('start-btn').onclick = startSequence;
            
            const toggleBtn = document.getElementById('music-toggle');
            toggleBtn.onclick = () => {
                const iconSpan = toggleBtn.querySelector('.icon');
                if (audioPlaying) {
                    stopMusic();
                    iconSpan.textContent = '🔇';
                } else {
                    startMusic();
                    iconSpan.textContent = '🔊';
                }
            };
            
            window.onresize = () => {
                if (currentState === STATE_WALKING || currentState === STATE_IDLE) {
                    const isMobile = window.innerWidth <= 600;
                    const milestoneRect = milestone22.getBoundingClientRect();
                    destX = milestoneRect.left - (isMobile ? 85 : 130);
                    if (destX < (isMobile ? 20 : 50)) { destX = window.innerWidth * (isMobile ? 0.35 : 0.45); }
                }
            };
        };
    </script>
</body>
</html>
